<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Shield Gradient -->
    <linearGradient id="shieldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2A44"></stop>
      <stop offset="100%" stop-color="#141C2F"></stop>
    </linearGradient>

    <!-- Animated Border Gradient -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C7AEA">
        <animate attributeName="offset" values="0;1;0" dur="6s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="100%" stop-color="#8F6BFF">
        <animate attributeName="offset" values="1;0;1" dur="6s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <!-- Star Gradient -->
    <linearGradient id="starGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"></stop>
      <stop offset="100%" stop-color="#FFB300"></stop>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs>

  <!-- Shield -->
  <path d="M100 10 L20 50 V110 C20 160 55 195 100 210 C145 195 180 160 180 110 V50 Z" fill="url(#shieldGradient)" stroke="url(#borderGradient)" stroke-width="6" filter="url(#glow)">
    <animate attributeName="stroke-width" values="6;8;6" dur="3s" repeatCount="indefinite"></animate>
  </path>

  <!-- Pulsing Star -->
  <polygon points="100,60 112,90 145,90 118,110 128,145 100,125 72,145 82,110 55,90 88,90" fill="url(#starGradient)">
    <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2.5s" repeatCount="indefinite" additive="sum"></animateTransform>
  </polygon>

</svg>