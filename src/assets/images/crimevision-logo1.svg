<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="shieldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2A44"></stop>
      <stop offset="100%" stop-color="#141C2F"></stop>
    </linearGradient>

    <linearGradient id="borderGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C7AEA"></stop>
      <stop offset="100%" stop-color="#8F6BFF"></stop>
    </linearGradient>

    <linearGradient id="starGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"></stop>
      <stop offset="100%" stop-color="#FFB300"></stop>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"></feDropShadow>
    </filter>

  </defs>

  <!-- Shield -->
  <path d="M100 10 L20 50 V110 C20 160 55 195 100 210 C145 195 180 160 180 110 V50 Z" fill="url(#shieldGradient)" stroke="url(#borderGradient)" stroke-width="6" filter="url(#shadow)"></path>

  <!-- Star -->
  <polygon points="100,60 112,90 145,90 118,110 128,145 100,125 72,145 82,110 55,90 88,90" fill="url(#starGradient)"></polygon>

</svg>